name: Deploy to Azure Container Apps

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_NAME: treasury-take-home-v3

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to Azure Container Registry
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Build and push image
        run: |
          IMAGE="${{ secrets.ACR_LOGIN_SERVER }}/${IMAGE_NAME}:${{ github.sha }}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Deploy to Azure Container Apps
        run: |
          az containerapp update \
            --name ${{ secrets.AZURE_CONTAINER_APP_NAME }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --image "$IMAGE" \
            --set-env-vars \
              PROCESSING_MODE=llm \
              OPENROUTER_BASE_URL=https://openrouter.ai/api/v1 \
              OPENROUTER_MODEL=${{ vars.OPENROUTER_MODEL || 'nex-agi/nex-n2-pro' }} \
              OPENROUTER_API_KEY=secretref:openrouter-api-key \
              ALLOW_LOCAL_OCR=true \
              SHOW_RAW_EXTRACTION=false \
              BATCH_PARALLELISM=2 \
              LLM_REQUEST_TIMEOUT_SECONDS=30

